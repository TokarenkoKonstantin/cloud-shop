---
- name: Install security packages
  apt:
    name:
      - fail2ban
      - ufw
    state: present
    update_cache: true

- name: Ensure fail2ban is running
  service:
    name: fail2ban
    state: started
    enabled: true

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable UFW
  ufw:
    state: enabled
