---
# Playbook: expand-disks.yml
# Description: Expand LVM filesystem on all K8s nodes after VMware disk resize 10GB → 20GB
# Requirements:
#   - Ansible 2.10+
#   - Target hosts: Ubuntu 22.04 (LVM layout: /dev/sda3 → ubuntu-vg/ubuntu-lv)
#   - VMware disk already expanded to 20GB BEFORE running this playbook
# Usage:
#   ansible-playbook -i inventory.ini expand-disks.yml

- name: Expand LVM filesystem on K8s nodes
  hosts: all
  become: true
  gather_facts: true

  tasks:
    - name: Install cloud-guest-utils (provides growpart)
      ansible.builtin.apt:
        name: cloud-guest-utils
        state: present
        update_cache: false

    - name: Grow partition /dev/sda3 to fill available disk space
      ansible.builtin.command:
        cmd: growpart /dev/sda 3
      register: growpart_result
      changed_when: "'CHANGED' in growpart_result.stdout"
      failed_when:
        - growpart_result.rc != 0
        - "'NOCHANGE' not in growpart_result.stdout"

    - name: Resize PV to use new partition size
      ansible.builtin.command:
        cmd: pvresize /dev/sda3
      register: pvresize_result
      changed_when: "'changed size' in pvresize_result.stdout"

    - name: Extend LV to use all free space in VG
      ansible.builtin.command:
        cmd: lvextend -l +100%FREE /dev/ubuntu-vg/ubuntu-lv
      register: lvextend_result
      changed_when: lvextend_result.rc == 0
      failed_when:
        - lvextend_result.rc != 0
        - "'already at maximum size' not in lvextend_result.stderr"

    - name: Resize ext4 filesystem to fill extended LV
      ansible.builtin.command:
        cmd: resize2fs /dev/ubuntu-vg/ubuntu-lv
      register: resize2fs_result
      changed_when: "'nothing to do' not in resize2fs_result.stdout"

    - name: Verify disk size after expansion
      ansible.builtin.command:
        cmd: df -h /
      register: df_result
      changed_when: false

    - name: Show disk usage on each node
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} → {{ df_result.stdout_lines[1] }}"
