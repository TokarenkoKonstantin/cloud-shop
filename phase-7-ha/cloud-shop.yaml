apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloud-shop
spec:
  replicas: 3
  selector:
    matchLabels:
      app: cloud-shop
  template:
    metadata:
      labels:
        app: cloud-shop
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
              - key: app
                operator: In
                values:
                - cloud-shop
            topologyKey: kubernetes.io/hostname
      containers:
      - name: cloud-shop
        image: nginx:alpine
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: cloud-shop
spec:
  selector:
    app: cloud-shop
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cloud-shop-pdb
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cloud-shop
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloud-shop
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: shop.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cloud-shop
            port:
              number: 80
