name: Build user-service

on:
  push:
    branches: [main]
    paths:
      - 'phase-1-docker/applications/user-service/**'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: tokarenkokonstantin/user-service

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./phase-1-docker/applications/user-service
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Update image tag in manifest
        run: |
          sed -i "s|image: .*user-service.*|image: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}|" k8s/base/user-service.yaml
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add k8s/base/user-service.yaml
          git commit -m "ci: update user-service image to ${{ github.sha }}"
          git pull --rebase
          git push
